openapi: 3.1.0
info:
  title: Notion Webhook API
  description: API para consultar páginas, pesquisar conteúdo e acessar databases do Notion.
  version: 1.0.0
servers:
  - url: https://SEU_DOMINIO_OU_IP:3000
    description: Servidor de produção
paths:
  /search:
    get:
      operationId: searchNotion
      summary: Busca páginas no Notion por texto
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Texto a ser buscado nas páginas do Notion
      responses:
        "200":
          description: Lista de páginas encontradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        url:
                          type: string
                        last_edited:
                          type: string
  /page/{id}:
    get:
      operationId: getPage
      summary: Retorna o conteúdo completo de uma página do Notion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID da página no Notion
      responses:
        "200":
          description: Conteúdo da página
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  url:
                    type: string
                  last_edited:
                    type: string
                  content:
                    type: string
  /database/{id}:
    get:
      operationId: queryDatabase
      summary: Lista entradas de um database do Notion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID do database no Notion
        - name: filter
          in: query
          required: false
          schema:
            type: string
          description: Filtro opcional por nome
      responses:
        "200":
          description: Lista de entradas do database
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        url:
                          type: string
                        properties:
                          type: object
                        last_edited:
                          type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
